services:
    jaeger:
        image: jaegertracing/jaeger:2.7.0
        ports:
            - "16686:16686"
            - "4317:4317"
            - "4318:4318"
            - "5778:5778"
            - "9411:9411"

    app:
        build: .
        depends_on:
            - jaeger
        environment:
            - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
